<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ApexLens</title>
  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="../styles/themes.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="app-container">
    <header>
      <div class="title-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        <h1>ApexLens</h1>
      </div>
      <div class="theme-toggle" id="theme-toggle" style="cursor: pointer;" title="Toggle Theme">🌙</div>
    </header>
    <nav class="tabs">
      <button class="tab active" data-target="raw-log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        Log Explorer
      </button>
      <button class="tab" data-target="method-flow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><line x1="6" y1="9" x2="6" y2="21"></line></svg>
        Method Flow
      </button>
      <button class="tab" data-target="raw-tree">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"></path><path d="m8 7 4-4 4 4"></path><path d="m8 17 4 4 4-4"></path></svg>
        Execution Tree
      </button>
      <button class="tab" data-target="apex-debug">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"></path><path d="m6 8-4 4 4 4"></path><path d="m14.5 4-5 16"></path></svg>
        Apex Debug
      </button>
      <button class="tab" data-target="method-tree">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        Method Hierarchy
      </button>
      <button class="tab disabled" data-target="dml-dashboard" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        DML
      </button>
      <button class="tab disabled" data-target="soql-analyzer" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
        SOQL
      </button>
      <button class="tab disabled" data-target="perf-dashboard" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        Performance
      </button>
      <button class="tab disabled" data-target="limits" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Limits
      </button>
      <button class="tab disabled" data-target="errors" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        Errors
      </button>
      <button class="tab disabled" data-target="timeline" title="Coming Soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Timeline
      </button>
    </nav>
    <main class="tab-content">
      <div id="raw-log" class="panel active">
        <h2>Log Explorer</h2>
      </div>
      <div id="method-flow" class="panel">
      </div>
      <div id="raw-tree" class="panel">
        <h2>Execution Tree</h2>
      </div>
      <div id="apex-debug" class="panel">
        <h2>Apex Debug Logs</h2>
      </div>
      <div id="method-tree" class="panel">
        <h2>Method Hierarchy</h2>
      </div>
      <div id="dml-dashboard" class="panel">
        <h2>DML Operations</h2>
      </div>
      <div id="soql-analyzer" class="panel">
        <h2>SOQL Queries</h2>
      </div>
      <div id="perf-dashboard" class="panel">
        <h2>Performance Metrics</h2>
      </div>
      <div id="limits" class="panel">
        <h2>Governor Limits</h2>
      </div>
      <div id="errors" class="panel">
        <h2>Error Inspector</h2>
      </div>
      <div id="timeline" class="panel">
        <h2>Timeline</h2>
      </div>
    </main>
    <script src="../lib/log-parser.js"></script>
    <script src="../lib/analyzer.js"></script>
    <script src="../lib/tree-builder.js"></script>
    <script src="../lib/chart-builder.js"></script>
    <script src="../components/raw-log-view.js"></script>
    <script src="../components/raw-tree-view.js"></script>
    <script src="../components/apex-debug-view.js"></script>
    <script src="../components/method-tree.js"></script>
    <script src="../lib/d3.min.js"></script>
    <script src="../components/flow-graph.js"></script>
    <script src="../components/dml-dashboard.js"></script>
    <script src="../components/soql-analyzer.js"></script>
    <script src="../components/performance-dashboard.js"></script>
    <script src="../components/governor-limits.js"></script>
    <script src="../components/error-inspector.js"></script>
    <script src="../components/timeline.js"></script>
    <script src="sidepanel.js"></script>
  </div>
</body>

</html>
